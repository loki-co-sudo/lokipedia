<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4338ca"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- fox head silhouette (ears + face as one shape, trickster motif) -->
  <path d="M 18,6 L 50,28 L 82,6 L 79,54 L 50,92 L 21,54 Z" fill="#ffffff"/>

  <!-- sparkle on forehead: insight / intellect -->
  <path d="M 50,26 L 53,35 L 62,38 L 53,41 L 50,50 L 47,41 L 38,38 L 47,35 Z" fill="#fbbf24"/>

  <!-- eyes (sly / upward-slanted at outer corner) -->
  <line x1="30" y1="55" x2="44" y2="65" stroke="#312e81" stroke-width="5" stroke-linecap="round"/>
  <line x1="70" y1="55" x2="56" y2="65" stroke="#312e81" stroke-width="5" stroke-linecap="round"/>

  <!-- nose -->
  <path d="M 44,80 L 56,80 L 50,90 Z" fill="#312e81"/>
</svg>
