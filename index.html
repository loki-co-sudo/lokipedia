<!doctype html>
<html lang="ja">
  <head>
    <script>
      // バンドル読み込み前にテーマを確定させる（docs/DESIGN.md §5.5）。FOUC 防止のため index.css より先に実行する。
      (function () {
        try {
          var stored = localStorage.getItem('lokipedia:theme')
          var theme = stored === 'light' || stored === 'dark' || stored === 'loki' ? stored : 'loki'
          document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'loki')
        }
      })()
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#1e1b4b" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>lokipedia</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
